name: Build & Release APK

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android platform 36
        run: sdkmanager "platforms;android-36" "build-tools;35.0.0"

      - name: Grant gradlew execute permission
        run: chmod +x gradlew

      # ── Signed release APK (requires secrets) ──────────────────────────────
      # Per abilitare APK firmato aggiungi questi secrets al repo:
      #   SIGNING_KEYSTORE_BASE64  → keystore .jks in base64 (base64 -w0 key.jks)
      #   SIGNING_STORE_PASSWORD   → password del keystore
      #   SIGNING_KEY_ALIAS        → alias della chiave
      #   SIGNING_KEY_PASSWORD     → password della chiave
      # ───────────────────────────────────────────────────────────────────────
      - name: Decode keystore
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        run: echo "${{ secrets.SIGNING_KEYSTORE_BASE64 }}" | base64 -d > keystore.jks

      - name: Build signed release APK
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 != '' }}
        env:
          SIGNING_STORE_FILE: ${{ github.workspace }}/keystore.jks
          SIGNING_STORE_PASSWORD: ${{ secrets.SIGNING_STORE_PASSWORD }}
          SIGNING_KEY_ALIAS: ${{ secrets.SIGNING_KEY_ALIAS }}
          SIGNING_KEY_PASSWORD: ${{ secrets.SIGNING_KEY_PASSWORD }}
        run: |
          ./gradlew assembleRelease
          cp app/build/outputs/apk/release/app-release.apk n0w-${{ github.ref_name }}.apk

      - name: Build debug APK
        if: ${{ secrets.SIGNING_KEYSTORE_BASE64 == '' }}
        run: |
          ./gradlew assembleDebug
          cp app/build/outputs/apk/debug/app-debug.apk n0w-${{ github.ref_name }}.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: n0w-${{ github.ref_name }}
          path: n0w-${{ github.ref_name }}.apk

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: n0w-${{ github.ref_name }}.apk
          generate_release_notes: true
